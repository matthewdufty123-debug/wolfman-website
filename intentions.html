<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Intentions — Wolfman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>(function(){var t=localStorage.getItem('wolfman-theme')||'dark';document.documentElement.setAttribute('data-theme',t);var f=localStorage.getItem('wolfman-fontsize')||'normal';document.documentElement.setAttribute('data-fontsize',f);})();</script>
  </head>
  <body class="page-intentions">

    <main>
      <header class="intentions-header">
        <h1 class="intentions-title">Morning Intentions</h1>
        <a href="admin.html" class="admin-link" target="_blank" rel="noopener">+ new post</a>
      </header>
      <ul class="post-list" id="postList" aria-live="polite"></ul>
    </main>

    <script src="js/nav.js"></script>
    <script src="js/theme.js"></script>
    <script>
      // ── Post list loader ──
      // Note: fetch() requires a server (http://). For local preview run: npx serve .

      function formatDate(iso) {
        const [y, m, d] = iso.split('-').map(Number);
        return new Date(y, m - 1, d).toLocaleDateString('en-GB', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
      }

      const list = document.getElementById('postList');

      Promise.all([
        fetch('posts/posts.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('posts/categories.json').then(r => { if (!r.ok) throw new Error(); return r.json(); })
      ])
      .then(([posts, categories]) => {
        const catMap = Object.fromEntries(categories.map(c => [c.id, c.label]));

        if (!posts.length) {
          list.innerHTML = '<li class="post-list-empty">Nothing here yet. Check back tomorrow.</li>';
          return;
        }

        list.innerHTML = posts.map(p => `
          <li class="post-list-item">
            <a class="post-list-link" href="posts/${p.slug}.html">
              <span class="post-list-date">${formatDate(p.date)}</span>
              <span class="post-list-title">${p.title}</span>
              <span class="post-list-category">${catMap[p.category] || ''}</span>
            </a>
          </li>`).join('');
      })
      .catch(() => {
        list.innerHTML = '<li class="post-list-error">The intentions are resting. Try again shortly.</li>';
      });
    </script>

  </body>
</html>
